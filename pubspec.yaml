name: smart_geo_landmarks
description: Smart Geo-Tagged Landmarks App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Maps
  google_maps_flutter: ^2.5.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location
  geolocator: ^12.0.0

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
#  assets:
#    - assets/
